server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compress textual assets
  gzip on;
  gzip_types text/html text/css application/javascript application/json image/svg+xml;
  gzip_min_length 512;

  # Don't cache the HTML itself — we want deploy changes to show up immediately.
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  # Cache static assets aggressively if we add any later
  location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Health check for the orchestration layer
  location = /health {
    access_log off;
    return 200 "OK";
    default_type text/plain;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
